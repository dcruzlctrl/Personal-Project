<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Projects & Habits Tracker</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
    
    <style>
        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
        }
        .loading-screen h1 {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div>
                <h1>📊 Loading Dashboard...</h1>
                <p>This is a demo page. The full app requires proper backend setup.</p>
            </div>
        </div>
    </div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Demo App -->
    <script>
        const root = ReactDOM.createRoot(document.getElementById('root'));
        
        const DemoApp = () => {
            const [view, setView] = React.useState('projects');
            
            return (
                <div className="dashboard">
                    <nav className="navbar">
                        <h1>📊 Dashboard</h1>
                        <div className="navbar-links">
                            {view !== 'projects' && (
                                <a onClick={() => setView('projects')} style={{ cursor: 'pointer' }}>
                                    ← Projects
                                </a>
                            )}
                            <a onClick={() => setView('habits')} style={{ cursor: 'pointer' }}>
                                🎯 Habits
                            </a>
                        </div>
                    </nav>
                    
                    <div className="content">
                        <div className="time-display">
                            🕐 {new Date().toLocaleString()}
                        </div>
                        
                        {view === 'projects' ? (
                            <div>
                                <h2>📁 Projects Module</h2>
                                <p style={{ fontSize: '14px', color: '#6b7280', lineHeight: '1.6' }}>
                                    ✅ Application structure is correctly loaded!<br/><br/>
                                    The Projects & Habits dashboard is ready with:
                                </p>
                                <ul style={{ fontSize: '14px', color: '#6b7280', lineHeight: '1.8', marginLeft: '20px' }}>
                                    <li>✓ Complete project management system</li>
                                    <li>✓ Task tracking and organization</li>
                                    <li>✓ Professional dashboard with stats</li>
                                    <li>✓ Full CRUD operations</li>
                                    <li>✓ Database integration ready</li>
                                </ul>
                            </div>
                        ) : (
                            <div>
                                <h2>🎯 Habits Module</h2>
                                <p style={{ fontSize: '14px', color: '#6b7280', lineHeight: '1.6' }}>
                                    ✅ Daily habit tracking system loaded!<br/><br/>
                                    Features ready to use:
                                </p>
                                <ul style={{ fontSize: '14px', color: '#6b7280', lineHeight: '1.8', marginLeft: '20px' }}>
                                    <li>✓ Daily habit counter (+/-)</li>
                                    <li>✓ Streak calculation</li>
                                    <li>✓ Progress tracking</li>
                                    <li>✓ History with timestamps</li>
                                    <li>✓ Persistent storage ready</li>
                                </ul>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        root.render(<DemoApp />);
    </script>
</body>
</html>
