        .streak-number {

        .streak-label {

<body>
    <div id="root"></div>

    <script type="text/babel">
        // ===== CONFIGURATION =====
        const SUPABASE_URL = "https://wthjcbkfpjgjsqyqcghx.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Que8SpJa0CzVEQbgC8Mv5A_mjJfTu_B";

        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ===== TIMEZONE UTILITIES (NYC) =====
        // EDT (Eastern Daylight Time) = UTC-4
        function getTimezoneOffset() {
            return -4; // EDT
        }

        function getNYCDate() {
            const now = new Date();
            const offset = getTimezoneOffset();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const nycTime = new Date(utcTime + (offset * 3600000));
            
            const year = nycTime.getUTCFullYear();
            const month = String(nycTime.getUTCMonth() + 1).padStart(2, '0');
            const day = String(nycTime.getUTCDate()).padStart(2, '0');
            
            return `${year}-${month}-${day}`;
        }

        function getNYCTimeString() {
            const now = new Date();
            const offset = getTimezoneOffset();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const nycTime = new Date(utcTime + (offset * 3600000));
            
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            const dayName = days[nycTime.getUTCDay()];
            const monthName = months[nycTime.getUTCMonth()];
            const date = nycTime.getUTCDate();
            const hours = nycTime.getUTCHours();
            const minutes = String(nycTime.getUTCMinutes()).padStart(2, '0');
            const seconds = String(nycTime.getUTCSeconds()).padStart(2, '0');
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const hours12 = hours % 12 || 12;
            const tzName = 'EDT';
            
            return `${dayName} ${monthName} ${date} ${String(hours12).padStart(2, '0')}:${minutes}:${seconds} ${ampm} ${tzName}`;
        }

        // ===== STREAK CALCULATION =====
        async function calculateStreaks(habitId, logs) {
            try {
                // Get all logs for this habit, sorted by date descending
                const allLogs = logs || [];
                allLogs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                // Get unique dates that have logs
                const dates = new Set();
                allLogs.forEach(log => {
                    const date = new Date(log.timestamp);
                    const offset = getTimezoneOffset();
                    const utcTime = date.getTime() + (date.getTimezoneOffset() * 60000);
                    const nycTime = new Date(utcTime + (offset * 3600000));
                    const dateStr = nycTime.toISOString().split('T')[0];
                    dates.add(dateStr);
                });
                
                // Calculate current streak
                const sortedDates = Array.from(dates).sort().reverse();
                let currentStreak = 0;
                const today = getNYCDate();
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = getNYCDateFromDate(yesterday);
                
                // Start from today or yesterday
                let checkDate = today;
                for (const date of sortedDates) {
                    if (date === checkDate || date === yesterdayStr) {
                        currentStreak++;
                        // Go to previous day
                        const prevDate = new Date(date);
                        prevDate.setDate(prevDate.getDate() - 1);
                        checkDate = prevDate.toISOString().split('T')[0];
                    } else {
                        break;
                    }
                }
                
                // Get longest streak from all dates
                let longestStreak = 0;
                let tempStreak = 1;
                for (let i = 0; i < sortedDates.length - 1; i++) {
                    const current = new Date(sortedDates[i]);
                    const next = new Date(sortedDates[i + 1]);
                    const diffDays = (current - next) / (1000 * 60 * 60 * 24);
                    
                    if (diffDays === 1) {
                        tempStreak++;
                    } else {
                        longestStreak = Math.max(longestStreak, tempStreak);
                        tempStreak = 1;
                    }
                }
                longestStreak = Math.max(longestStreak, tempStreak, currentStreak);
                
                // Update database
                if (longestStreak > 0) {
                    await supabase
                        .from('habits')
                        .update({ 
                            current_streak: currentStreak,
                            longest_streak: longestStreak
                        })
                        .eq('id', habitId);
                }
                
                return { currentStreak, longestStreak };
            } catch (err) {
                console.error('Error calculating streaks:', err);
                return { currentStreak: 0, longestStreak: 0 };
            }
        }

        function getNYCDateFromDate(date) {
            const offset = getTimezoneOffset();
            const utcTime = date.getTime() + (date.getTimezoneOffset() * 60000);
            const nycTime = new Date(utcTime + (offset * 3600000));
            
            const year = nycTime.getUTCFullYear();
            const month = String(nycTime.getUTCMonth() + 1).padStart(2, '0');
            const day = String(nycTime.getUTCDate()).padStart(2, '0');
            
            return `${year}-${month}-${day}`;
        }

        // ===== MAIN APP =====
        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [currentTime, setCurrentTime] = React.useState(getNYCTimeString());

            React.useEffect(() => {
                checkUser();
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                });

                const timeInterval = setInterval(() => {
                    setCurrentTime(getNYCTimeString());
                }, 1000);

                return () => {
                    authListener?.subscription?.unsubscribe();
                    clearInterval(timeInterval);
                };
            }, []);

            const checkUser = async () => {
                const { data } = await supabase.auth.getSession();
                setUser(data.session?.user || null);
                setLoading(false);
            };

            if (loading) return <div className="loading">Loading...</div>;

            if (!user) {
                return <AuthPage onAuthSuccess={(u) => setUser(u)} />;
            }

            return (
                <div className="dashboard">
                    <nav className="navbar">
                        <h1>🎯 Habits</h1>
                        <div className="navbar-links">
                            <a href="index.html">← Dashboard</a>
                            <button onClick={() => handleLogout()}>Logout</button>
                        </div>
                    </nav>

                    <div className="content">
                        <div className="time-display">
                            🕐 {currentTime}
                        </div>
                        <HabitsView user={user} />
                    </div>
                </div>
            );

            async function handleLogout() {
                await supabase.auth.signOut();
                setUser(null);
            }
        }

        // ===== AUTHENTICATION =====
        function AuthPage({ onAuthSuccess }) {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [isSignUp, setIsSignUp] = React.useState(false);
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    if (isSignUp) {
                        const { error: err } = await supabase.auth.signUp({ email, password });
                        if (err) throw err;
                        setError('Check your email to confirm!');
                    } else {
                        const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
                        if (err) throw err;
                        onAuthSuccess(data.user);
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="auth-container">
                    <div className="auth-card">
                        <h1>{isSignUp ? 'Sign Up' : 'Sign In'}</h1>
                        {error && <div className="error">{error}</div>}

                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Email</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
                            </div>

                            <div className="form-group">
                                <label>Password</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
                            </div>

                            <button type="submit" className="btn btn-primary" disabled={loading}>
                                {loading ? 'Loading...' : (isSignUp ? 'Sign Up' : 'Sign In')}
                            </button>
                        </form>

                        <button type="button" className="btn btn-secondary" onClick={() => { setIsSignUp(!isSignUp); setError(''); }}>
                            {isSignUp ? 'Sign In' : 'Sign Up'}
                        </button>
                    </div>
                </div>
            );
        }

        // ===== HABITS VIEW =====
        function HabitsView({ user }) {
            const [habits, setHabits] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [newHabitName, setNewHabitName] = React.useState('');
            const [selectedHabit, setSelectedHabit] = React.useState(null);

            React.useEffect(() => {
                loadHabits();
                const interval = setInterval(loadHabits, 60000);
                return () => clearInterval(interval);
            }, []);

            const loadHabits = async () => {
                try {
                    const { data, error } = await supabase
                        .from('habits')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    
                    const habitsWithReset = await Promise.all(
                        (data || []).map(async (habit) => {
                            // Check if daily reset needed
                            if (habit.reset_daily) {
                                const nycToday = getNYCDate();
                                const lastReset = habit.last_reset_date || nycToday;
                                
                                if (lastReset !== nycToday) {
                                    await supabase
                                        .from('habits')
                                        .update({ last_reset_date: nycToday, count: 0 })
                                        .eq('id', habit.id);
                                    return { ...habit, last_reset_date: nycToday, count: 0 };
                                }
                            }
                            return habit;
                        })
                    );
                    
                    setHabits(habitsWithReset);
                } catch (err) {
                    console.error('Error loading habits:', err);
                } finally {
                    setLoading(false);
                }
            };

            const handleAddHabit = async (e) => {
                e.preventDefault();
                if (!newHabitName.trim()) return;

                try {
                    const { error } = await supabase.from('habits').insert({
                        user_id: user.id,
                        name: newHabitName,
                        count: 0,
                        reset_daily: false,
                        last_reset_date: getNYCDate(),
                        current_streak: 0,
                        longest_streak: 0
                    });

                    if (error) throw error;
                    setNewHabitName('');
                    loadHabits();
                } catch (err) {
                    console.error('Error adding habit:', err);
                }
            };

            const handleIncrement = async (habitId, e) => {
                e.stopPropagation();
                try {
                    const habit = habits.find(h => h.id === habitId);
                    
                    await supabase
                        .from('habits')
                        .update({ count: habit.count + 1 })
                        .eq('id', habitId);

                    await supabase.from('habit_logs').insert({
                        habit_id: habitId,
                        change: 1,
                        timestamp: new Date().toISOString()
                    });

                    loadHabits();
                } catch (err) {
                    console.error('Error incrementing habit:', err);
                }
            };

            const handleDecrement = async (habitId, e) => {
                e.stopPropagation();
                try {
                    const habit = habits.find(h => h.id === habitId);
                    if (habit.count > 0) {
                        await supabase
                            .from('habits')
                            .update({ count: habit.count - 1 })
                            .eq('id', habitId);

                        await supabase.from('habit_logs').insert({
                            habit_id: habitId,
                            change: -1,
                            timestamp: new Date().toISOString()
                        });

                        loadHabits();
                    }
                } catch (err) {
                    console.error('Error decrementing habit:', err);
                }
            };

            if (loading) return <div className="loading">Loading habits...</div>;

            return (
                <>
                    <div className="section-header">
                        <h2>My Habits</h2>
                    </div>

                    <div className="add-habit-form">
                        <form onSubmit={handleAddHabit} style={{ display: 'flex', gap: '12px', width: '100%' }}>
                            <input
                                type="text"
                                value={newHabitName}
                                onChange={(e) => setNewHabitName(e.target.value)}
                                placeholder="Add habit..."
                                required
                                style={{ flex: 1 }}
                            />
                            <button type="submit">+ Add</button>
                        </form>
                    </div>

                    {habits.length === 0 ? (
                        <div className="empty-state">
                            <h3>No habits yet</h3>
                            <p>Add one above to get started</p>
                        </div>
                    ) : (
                        <div>
                            {habits.map(habit => (
                                <div 
                                    key={habit.id}
                                    className="habit-card"
                                    onClick={() => setSelectedHabit(habit)}
                                >
                                    <div className="habit-card-content">
                                        <div className="habit-name">{habit.name}</div>
                                        <div className="habit-counter">
                                            <button 
                                                className="counter-btn counter-btn-decrement"
                                                onClick={(e) => handleDecrement(habit.id, e)}
                                            >
                                                −
                                            </button>
                                            <div className="count-display">{habit.count}</div>
                                            <button 
                                                className="counter-btn counter-btn-increment"
                                                onClick={(e) => handleIncrement(habit.id, e)}
                                            >
                                                +
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {selectedHabit && (
                        <HabitDetailModal
                            habit={selectedHabit}
                            onClose={() => setSelectedHabit(null)}
                            onRefresh={loadHabits}
                        />
                    )}
                </>
            );
        }

        // ===== HABIT DETAIL MODAL =====
        function HabitDetailModal({ habit, onClose, onRefresh }) {
            const [logs, setLogs] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [totalCount, setTotalCount] = React.useState(0);
            const [streaks, setStreaks] = React.useState({ currentStreak: 0, longestStreak: 0 });

            React.useEffect(() => {
                loadLogs();
            }, [habit.id]);

            const loadLogs = async () => {
                try {
                    const { data, error } = await supabase
                        .from('habit_logs')
                        .select('*')
                        .eq('habit_id', habit.id)
                        .order('timestamp', { ascending: false });

                    if (error) throw error;
                    
                    setLogs(data || []);
                    const total = (data || []).reduce((sum, log) => sum + log.change, 0);
                    setTotalCount(total);
                    
                    // Calculate streaks
                    const streakData = await calculateStreaks(habit.id, data || []);
                    setStreaks(streakData);
                } catch (err) {
                    console.error('Error loading logs:', err);
                } finally {
                    setLoading(false);
                }
            };

            const handleToggleReset = async () => {
                try {
                    await supabase
                        .from('habits')
                        .update({ 
                            reset_daily: !habit.reset_daily,
                            last_reset_date: getNYCDate()
                        })
                        .eq('id', habit.id);
                    onRefresh();
                } catch (err) {
                    console.error('Error updating habit:', err);
                }
            };

            const handleDelete = async () => {
                if (window.confirm('Delete this habit and all history?')) {
                    try {
                        await supabase.from('habits').delete().eq('id', habit.id);
                        onClose();
                        onRefresh();
                    } catch (err) {
                        console.error('Error deleting habit:', err);
                    }
                }
            };

            return (
                <div className="modal">
                    <div className="modal-content">
                        <div className="modal-header">
                            <h2>{habit.name}</h2>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>

                        <div className="streak-section">
                            <div className="streak-label">🔥 Current Streak</div>
                            <div className="streak-number">{streaks.currentStreak}</div>
                            <div className="streak-label">days</div>
                            <div className="streak-best">Best: {streaks.longestStreak} days</div>
                        </div>

                        <div className="modal-section">
                            <h3>📊 Stats</h3>
                            <div className="count-stats">
                                <div className="stat">
                                    <div className="stat-label">Today</div>
                                    <div className="stat-value">{habit.count}</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-label">All-Time</div>
                                    <div className="stat-value total">{totalCount}</div>
                                </div>
                            </div>
                        </div>

                        <div className="modal-section">
                            <h3>⚙️ Settings</h3>
                            <div className="toggle-switch">
                                <div style={{ flex: 1 }}>
                                    <div className="info-text">Daily Reset</div>
                                    <div style={{ fontSize: '11px', color: '#6b7280' }}>Resets at 12 AM</div>
                                </div>
                                <input
                                    type="checkbox"
                                    className="toggle-checkbox"
                                    checked={habit.reset_daily}
                                    onChange={handleToggleReset}
                                />
                            </div>
                            {habit.reset_daily && (
                                <div className="reset-badge">✓ Daily reset enabled</div>
                            )}
                        </div>

                        {!loading && (
                            <div className="modal-section">
                                <h3>📈 History</h3>
                                {logs.length === 0 ? (
                                    <div style={{ color: '#9ca3af', textAlign: 'center', padding: '20px' }}>
                                        No history yet
                                    </div>
                                ) : (
                                    <div className="history-list">
                                        {logs.map((log, idx) => {
                                            const timestamp = new Date(log.timestamp);
                                            const offset = getTimezoneOffset();
                                            const utcTime = timestamp.getTime() + (timestamp.getTimezoneOffset() * 60000);
                                            const nycTime = new Date(utcTime + (offset * 3600000));
                                            
                                            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                                            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                                            
                                            const dayName = days[nycTime.getUTCDay()];
                                            const monthName = months[nycTime.getUTCMonth()];
                                            const date = nycTime.getUTCDate();
                                            const hours = nycTime.getUTCHours();
                                            const minutes = String(nycTime.getUTCMinutes()).padStart(2, '0');
                                            const ampm = hours >= 12 ? 'PM' : 'AM';
                                            const hours12 = hours % 12 || 12;
                                            
                                            const timeStr = `${dayName} ${monthName} ${date} ${String(hours12).padStart(2, '0')}:${minutes} ${ampm}`;
                                            const isPositive = log.change > 0;
                                            
                                            return (
                                                <div key={idx} className="history-item">
                                                    <div className="history-time">{timeStr}</div>
                                                    <div className={isPositive ? 'history-change-positive' : 'history-change-negative'}>
                                                        {isPositive ? '+' : ''}{log.change}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="modal-actions">
                            <button className="btn-modal-primary" onClick={onClose}>
                                Close
                            </button>
                            <button className="btn-modal-danger" onClick={handleDelete}>
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Render app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
