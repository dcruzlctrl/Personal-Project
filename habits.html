<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --font: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --bg: #f0fdf9;
            --surface: #ffffff;
            --border: #d1fae5;
            --border-std: #e2e8f0;
            --border-light: #f0fdf4;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;
            --accent: #0d9488;
            --accent-hover: #0f766e;
            --accent-light: #ccfbf1;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --danger-light: #fef2f2;
            --success: #10b981;
            --success-light: #ecfdf5;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --amber: #f59e0b;
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 40px -5px rgba(0,0,0,0.12), 0 8px 16px -6px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { height: 100%; width: 100%; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== AUTH ===== */
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #022c22;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(13,148,136,.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13,148,136,.1) 1px, transparent 1px);
            background-size: 44px 44px;
        }
        .auth-wrap::after {
            content: '';
            position: absolute;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(13,148,136,.18) 0%, transparent 68%);
            bottom: -260px; left: -160px;
            pointer-events: none;
        }
        .auth-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 44px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 1;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .auth-brand-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }
        .auth-brand-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .auth-card h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }
        .auth-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* ===== FORMS ===== */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid var(--border-std);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font);
            color: var(--text);
            background: var(--surface);
            transition: border-color .15s, box-shadow .15s;
        }
        .form-group input::placeholder { color: var(--text-subtle); }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(13,148,136,.12);
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 11px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-ghost {
            background: #f8fafc;
            color: var(--text);
            border: 1.5px solid var(--border-std);
            margin-top: 10px;
        }
        .btn-ghost:hover:not(:disabled) { background: #e9eef6; }

        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: var(--font);
            transition: all .15s;
        }
        .btn-sm-danger { background: var(--danger-light); color: var(--danger); }
        .btn-sm-danger:hover { background: var(--danger); color: white; }
        .btn-sm-primary { background: var(--accent); color: white; }
        .btn-sm-primary:hover { background: var(--accent-hover); }

        /* ===== FEEDBACK ===== */
        .msg {
            font-size: 13px;
            padding: 10px 13px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }
        .msg-error   { background: var(--danger-light);  color: #991b1b; border: 1px solid #fca5a5; }
        .msg-success { background: var(--success-light); color: #065f46; border: 1px solid #6ee7b7; }

        /* ===== LAYOUT ===== */
        .dashboard { background: var(--bg); min-height: 100vh; }

        .navbar {
            background: rgba(255,255,255,.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-std);
            padding: 0 28px;
            height: 58px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .nav-brand-icon {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
        }
        .nav-brand-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .nav-right { display: flex; gap: 2px; align-items: center; }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 7px 11px;
            border-radius: var(--radius-sm);
            border: none;
            background: none;
            font-family: var(--font);
            transition: all .15s;
        }
        .nav-link:hover { color: var(--text); background: #f1f5f9; }
        .nav-link-danger {
            color: var(--danger);
            background: none;
            border: none;
            padding: 7px 11px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font);
            transition: all .15s;
        }
        .nav-link-danger:hover { background: var(--danger-light); }

        .content {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ===== TIME CHIP ===== */
        .time-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: white;
            border: 1px solid var(--border-std);
            border-radius: 99px;
            padding: 7px 16px;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--accent);
            box-shadow: var(--shadow-xs);
            margin-bottom: 24px;
        }
        .time-chip-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
        }

        /* ===== ADD HABIT ===== */
        .add-habit-row {
            display: flex;
            gap: 10px;
            background: white;
            border: 1px solid var(--border-std);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-xs);
        }
        .add-habit-input {
            flex: 1;
            border: none;
            font-size: 14px;
            font-family: var(--font);
            color: var(--text);
            background: transparent;
            outline: none;
        }
        .add-habit-input::placeholder { color: var(--text-subtle); }
        .add-habit-btn {
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: all .15s;
            white-space: nowrap;
        }
        .add-habit-btn:hover { background: var(--accent-hover); }

        /* ===== HABIT CARDS ===== */
        .habit-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 10px;
            border: 1px solid var(--border-std);
            box-shadow: var(--shadow-xs);
            cursor: pointer;
            transition: all .2s;
        }
        .habit-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-1px);
            border-color: #99f6e4;
        }
        .habit-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .habit-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }
        .habit-counter {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .counter-btn {
            width: 38px; height: 38px;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        .counter-btn:active { transform: scale(.9); }
        .counter-decrement { background: var(--danger-light); color: var(--danger); }
        .counter-decrement:hover { background: var(--danger); color: white; }
        .counter-increment { background: var(--accent-light); color: var(--accent); }
        .counter-increment:hover { background: var(--accent); color: white; }
        .count-display {
            font-size: 24px;
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--accent);
            min-width: 38px;
            text-align: center;
            letter-spacing: -1px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.55);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeOverlay .15s ease;
        }
        @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
        .modal-box {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 26px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalSlide .2s ease;
        }
        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(10px) scale(.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .modal-close {
            width: 28px; height: 28px;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .modal-close:hover { background: #e2e8f0; color: var(--text); }
        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-footer .btn { margin: 0; }

        /* ===== STREAK SECTION ===== */
        .streak-block {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: var(--radius);
            padding: 22px;
            text-align: center;
            color: white;
            margin-bottom: 18px;
        }
        .streak-fire { font-size: 28px; margin-bottom: 4px; }
        .streak-num {
            font-size: 52px;
            font-weight: 800;
            font-family: var(--font-mono);
            line-height: 1;
            margin: 4px 0;
            letter-spacing: -2px;
        }
        .streak-unit {
            font-size: 14px;
            font-weight: 600;
            opacity: .9;
        }
        .streak-best {
            font-size: 12px;
            opacity: .75;
            margin-top: 10px;
            font-weight: 500;
        }

        /* ===== MODAL SECTIONS ===== */
        .modal-section {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid #f1f5f9;
        }
        .modal-section:last-child { border-bottom: none; }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 10px;
        }

        /* ===== STATS ===== */
        .stats-row {
            display: flex;
            gap: 12px;
        }
        .stat-box {
            flex: 1;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid var(--border-std);
        }
        .stat-lbl {
            font-size: 11px;
            color: var(--text-subtle);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-bottom: 4px;
        }
        .stat-val {
            font-size: 26px;
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--accent);
            letter-spacing: -1px;
        }
        .stat-val.all-time { color: var(--success); }

        /* ===== TOGGLE ===== */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 14px;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-std);
            margin-bottom: 8px;
        }
        .toggle-label { font-size: 14px; font-weight: 500; color: var(--text); }
        .toggle-hint  { font-size: 12px; color: var(--text-subtle); margin-top: 1px; }
        .toggle-check {
            width: 40px; height: 22px;
            appearance: none;
            background: #d1d5db;
            border-radius: 11px;
            cursor: pointer;
            position: relative;
            transition: background .25s;
            flex-shrink: 0;
        }
        .toggle-check:checked { background: var(--accent); }
        .toggle-check::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px; left: 2px;
            transition: transform .25s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .toggle-check:checked::after { transform: translateX(18px); }
        .reset-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--accent-light);
            color: var(--accent-hover);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ===== HISTORY ===== */
        .history-list {
            max-height: 240px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 12px;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--border-std);
            font-size: 13px;
        }
        .history-time { color: var(--text-muted); font-weight: 500; font-size: 12px; }
        .history-pos { color: var(--success); font-weight: 700; font-family: var(--font-mono); }
        .history-neg { color: var(--danger);  font-weight: 700; font-family: var(--font-mono); }

        /* ===== STATES ===== */
        .empty {
            text-align: center;
            padding: 56px 24px;
        }
        .empty-icon  { font-size: 40px; margin-bottom: 12px; opacity: .3; }
        .empty-title { font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        .empty-desc  { font-size: 13px; color: var(--text-subtle); }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: 14px;
            gap: 10px;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid #e2e8f0;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .65s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ===== CONFIGURATION =====
        const SUPABASE_URL = "https://wthjcbkfpjgjsqyqcghx.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Que8SpJa0CzVEQbgC8Mv5A_mjJfTu_B";
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ===== TIMEZONE UTILITIES (NYC) =====
        function getNYCDate() {
            const now = new Date();
            const nycTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            const year  = nycTime.getFullYear();
            const month = String(nycTime.getMonth() + 1).padStart(2, '0');
            const day   = String(nycTime.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getNYCTimeString() {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            return formatter.format(now) + ' EDT';
        }

        // ===== STREAK CALCULATION =====
        async function calculateStreaks(habitId, logs) {
            try {
                const allLogs = (logs || []).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                const dates = new Set();
                allLogs.forEach(log => {
                    const date = new Date(log.timestamp);
                    const nycTime = new Date(date.toLocaleString('en-US', { timeZone: 'America/New_York' }));
                    dates.add(`${nycTime.getFullYear()}-${String(nycTime.getMonth() + 1).padStart(2, '0')}-${String(nycTime.getDate()).padStart(2, '0')}`);
                });

                const sortedDates = Array.from(dates).sort().reverse();
                let currentStreak = 0;
                const today = getNYCDate();
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = getNYCDateFromDate(yesterday);

                let checkDate = today;
                for (const date of sortedDates) {
                    if (date === checkDate || date === yesterdayStr) {
                        currentStreak++;
                        const prevDate = new Date(date);
                        prevDate.setDate(prevDate.getDate() - 1);
                        checkDate = prevDate.toISOString().split('T')[0];
                    } else { break; }
                }

                let longestStreak = 0, tempStreak = 1;
                for (let i = 0; i < sortedDates.length - 1; i++) {
                    const current = new Date(sortedDates[i]);
                    const next    = new Date(sortedDates[i + 1]);
                    const diff    = (current - next) / (1000 * 60 * 60 * 24);
                    if (diff === 1) { tempStreak++; }
                    else { longestStreak = Math.max(longestStreak, tempStreak); tempStreak = 1; }
                }
                longestStreak = Math.max(longestStreak, tempStreak, currentStreak);

                if (longestStreak > 0) {
                    await supabase.from('habits')
                        .update({ current_streak: currentStreak, longest_streak: longestStreak })
                        .eq('id', habitId);
                }
                return { currentStreak, longestStreak };
            } catch (err) {
                console.error('Error calculating streaks:', err);
                return { currentStreak: 0, longestStreak: 0 };
            }
        }

        function getNYCDateFromDate(date) {
            const nycTime = new Date(date.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            const year  = nycTime.getFullYear();
            const month = String(nycTime.getMonth() + 1).padStart(2, '0');
            const day   = String(nycTime.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // ===== MAIN APP =====
        function App() {
            const [user, setUser]           = React.useState(null);
            const [loading, setLoading]     = React.useState(true);
            const [currentTime, setCurrentTime] = React.useState(getNYCTimeString());

            React.useEffect(() => {
                checkUser();
                const { data: authListener } = supabase.auth.onAuthStateChange((_, session) => {
                    setUser(session?.user || null);
                });
                const timer = setInterval(() => setCurrentTime(getNYCTimeString()), 1000);
                return () => {
                    authListener?.subscription?.unsubscribe();
                    clearInterval(timer);
                };
            }, []);

            const checkUser = async () => {
                const { data } = await supabase.auth.getSession();
                setUser(data.session?.user || null);
                setLoading(false);
            };

            if (loading) return <div className="loading"><div className="spinner"></div>Loading…</div>;
            if (!user)   return <AuthPage onAuthSuccess={(u) => setUser(u)} />;

            return (
                <div className="dashboard">
                    <nav className="navbar">
                        <div className="nav-brand">
                            <div className="nav-brand-icon">🎯</div>
                            <span className="nav-brand-text">Habits</span>
                        </div>
                        <div className="nav-right">
                            <a href="index.html" className="nav-link">← Dashboard</a>
                            <button className="nav-link-danger" onClick={handleLogout}>Sign out</button>
                        </div>
                    </nav>

                    <div className="content">
                        <div className="time-chip">
                            <div className="time-chip-dot"></div>
                            {currentTime}
                        </div>
                        <HabitsView user={user} />
                    </div>
                </div>
            );

            async function handleLogout() {
                await supabase.auth.signOut();
                setUser(null);
            }
        }

        // ===== AUTH PAGE =====
        function AuthPage({ onAuthSuccess }) {
            const [email, setEmail]       = React.useState('');
            const [password, setPassword] = React.useState('');
            const [isSignUp, setIsSignUp] = React.useState(false);
            const [error, setError]       = React.useState('');
            const [loading, setLoading]   = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setError('');
                try {
                    if (isSignUp) {
                        const { error: err } = await supabase.auth.signUp({ email, password });
                        if (err) throw err;
                        setError('✓ Check your email to confirm!');
                    } else {
                        const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
                        if (err) throw err;
                        onAuthSuccess(data.user);
                    }
                } catch (err) { setError(err.message); }
                finally { setLoading(false); }
            };

            const isSuccess = error.startsWith('✓');

            return (
                <div className="auth-wrap">
                    <div className="auth-card">
                        <div className="auth-brand">
                            <div className="auth-brand-icon">🎯</div>
                            <span className="auth-brand-name">Habits Tracker</span>
                        </div>
                        <h1>{isSignUp ? 'Create account' : 'Welcome back'}</h1>
                        <p className="auth-sub">{isSignUp ? 'Start building better habits' : 'Sign in to your tracker'}</p>

                        {error && <div className={`msg ${isSuccess ? 'msg-success' : 'msg-error'}`}>{error}</div>}

                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Email address</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" required />
                            </div>
                            <div className="form-group">
                                <label>Password</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" required />
                            </div>
                            <button type="submit" className="btn btn-primary" disabled={loading}>
                                {loading ? 'Loading…' : isSignUp ? 'Create account' : 'Sign in'}
                            </button>
                        </form>
                        <button type="button" className="btn btn-ghost" onClick={() => { setIsSignUp(!isSignUp); setError(''); }}>
                            {isSignUp ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}
                        </button>
                    </div>
                </div>
            );
        }

        // ===== HABITS VIEW =====
        function HabitsView({ user }) {
            const [habits, setHabits]         = React.useState([]);
            const [loading, setLoading]       = React.useState(true);
            const [newHabitName, setNewHabitName] = React.useState('');
            const [selectedHabit, setSelectedHabit] = React.useState(null);
            const [habitSortBy, setHabitSortBy] = React.useState('created');

            React.useEffect(() => {
                loadHabits();
                const interval = setInterval(loadHabits, 60000);
                return () => clearInterval(interval);
            }, []);

            const loadHabits = async () => {
                try {
                    const { data, error } = await supabase
                        .from('habits').select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false });
                    if (error) throw error;

                    const habitsWithReset = await Promise.all(
                        (data || []).map(async (habit) => {
                            if (habit.reset_daily) {
                                const nycToday = getNYCDate();
                                const lastReset = habit.last_reset_date || nycToday;
                                if (lastReset !== nycToday) {
                                    await supabase.from('habits')
                                        .update({ last_reset_date: nycToday, count: 0 })
                                        .eq('id', habit.id);
                                    return { ...habit, last_reset_date: nycToday, count: 0 };
                                }
                            }
                            return habit;
                        })
                    );
                    setHabits(habitsWithReset);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const handleAddHabit = async (e) => {
                e.preventDefault();
                if (!newHabitName.trim()) return;
                try {
                    const { error } = await supabase.from('habits').insert({
                        user_id: user.id,
                        name: newHabitName,
                        count: 0,
                        reset_daily: false,
                        last_reset_date: getNYCDate(),
                        current_streak: 0,
                        longest_streak: 0
                    });
                    if (error) throw error;
                    setNewHabitName('');
                    loadHabits();
                } catch (err) { console.error(err); }
            };

            const handleIncrement = async (habitId, e) => {
                e.stopPropagation();
                try {
                    const habit = habits.find(h => h.id === habitId);
                    await supabase.from('habits')
                        .update({ count: habit.count + 1 }).eq('id', habitId);
                    await supabase.from('habit_logs').insert({
                        habit_id: habitId, change: 1,
                        timestamp: new Date().toISOString()
                    });
                    loadHabits();
                } catch (err) { console.error(err); }
            };

            const handleDecrement = async (habitId, e) => {
                e.stopPropagation();
                try {
                    const habit = habits.find(h => h.id === habitId);
                    if (habit.count > 0) {
                        await supabase.from('habits')
                            .update({ count: habit.count - 1 }).eq('id', habitId);
                        await supabase.from('habit_logs').insert({
                            habit_id: habitId, change: -1,
                            timestamp: new Date().toISOString()
                        });
                        loadHabits();
                    }
                } catch (err) { console.error(err); }
            };

            const getSortedHabits = () => {
                const sorted = [...habits];
                switch (habitSortBy) {
                    case 'today':
                        return sorted.sort((a, b) => b.count - a.count);
                    case 'streak':
                        return sorted.sort((a, b) => b.current_streak - a.current_streak);
                    case 'name':
                        return sorted.sort((a, b) => a.name.localeCompare(b.name));
                    case 'created':
                    default:
                        return sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                }
            };

            if (loading) return <div className="loading"><div className="spinner"></div>Loading habits…</div>;

            return (
                <>
                    <div className="page-header">
                        <div className="page-title">My Habits</div>
                        <select
                            value={habitSortBy}
                            onChange={(e) => setHabitSortBy(e.target.value)}
                            style={{ padding: '6px 10px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '13px', cursor: 'pointer' }}
                        >
                            <option value="created">Newest</option>
                            <option value="today">Today's Count</option>
                            <option value="streak">Current Streak</option>
                            <option value="name">Name (A-Z)</option>
                        </select>
                    </div>

                    <form onSubmit={handleAddHabit}>
                        <div className="add-habit-row">
                            <input
                                className="add-habit-input"
                                type="text"
                                value={newHabitName}
                                onChange={(e) => setNewHabitName(e.target.value)}
                                placeholder="Add a new habit…"
                                required
                            />
                            <button type="submit" className="add-habit-btn">+ Add</button>
                        </div>
                    </form>

                    {habits.length === 0 ? (
                        <div className="empty">
                            <div className="empty-icon">🌱</div>
                            <div className="empty-title">No habits yet</div>
                            <div className="empty-desc">Add your first habit above to get started</div>
                        </div>
                    ) : (
                        <div>
                            {getSortedHabits().map(habit => (
                                <div key={habit.id} className="habit-card" onClick={() => setSelectedHabit(habit)}>
                                    <div className="habit-row">
                                        <div className="habit-name">
                                            {habit.name}
                                            {habit.reset_daily && <span style={{ marginLeft: '6px', fontSize: '12px', opacity: 0.6 }}>🕐</span>}
                                        </div>
                                        <div className="habit-counter">
                                            <button
                                                className="counter-btn counter-decrement"
                                                onClick={(e) => handleDecrement(habit.id, e)}
                                            >−</button>
                                            <div className="count-display">{habit.count}</div>
                                            <button
                                                className="counter-btn counter-increment"
                                                onClick={(e) => handleIncrement(habit.id, e)}
                                            >+</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {selectedHabit && (
                        <HabitDetailModal
                            habit={selectedHabit}
                            onClose={() => setSelectedHabit(null)}
                            onRefresh={loadHabits}
                        />
                    )}
                </>
            );
        }

        // ===== HABIT DETAIL MODAL =====
        function HabitDetailModal({ habit, onClose, onRefresh }) {
            const [logs, setLogs]           = React.useState([]);
            const [loading, setLoading]     = React.useState(true);
            const [totalCount, setTotalCount] = React.useState(0);
            const [streaks, setStreaks]     = React.useState({ currentStreak: 0, longestStreak: 0 });
            const [resetDaily, setResetDaily] = React.useState(habit.reset_daily);

            React.useEffect(() => { setResetDaily(habit.reset_daily); }, [habit.reset_daily]);
            React.useEffect(() => { loadLogs(); }, [habit.id]);

            const loadLogs = async () => {
                try {
                    const { data, error } = await supabase
                        .from('habit_logs').select('*')
                        .eq('habit_id', habit.id)
                        .order('timestamp', { ascending: false });
                    if (error) throw error;
                    setLogs(data || []);
                    setTotalCount((data || []).reduce((sum, log) => sum + log.change, 0));
                    const streakData = await calculateStreaks(habit.id, data || []);
                    setStreaks(streakData);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const handleToggleReset = async () => {
                const newValue = !resetDaily;
                setResetDaily(newValue);
                try {
                    await supabase.from('habits')
                        .update({ reset_daily: newValue, last_reset_date: getNYCDate() })
                        .eq('id', habit.id);
                    onRefresh();
                } catch (err) {
                    console.error(err);
                    setResetDaily(resetDaily);
                }
            };

            const handleResetDaily = async () => {
                if (window.confirm('Reset today\'s count to 0? (All-time count stays the same)')) {
                    try {
                        await supabase.from('habits')
                            .update({ count: 0, last_reset_date: getNYCDate() })
                            .eq('id', habit.id);
                        onRefresh();
                    } catch (err) { console.error(err); }
                }
            };

            const handleDelete = async () => {
                if (window.confirm('Delete this habit and all history?')) {
                    try {
                        await supabase.from('habits').delete().eq('id', habit.id);
                        onClose(); onRefresh();
                    } catch (err) { console.error(err); }
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-box">
                        <div className="modal-head">
                            <div className="modal-title">{habit.name}</div>
                            <button className="modal-close" onClick={onClose}>✕</button>
                        </div>

                        {/* Streak */}
                        <div className="streak-block">
                            <div className="streak-fire">🔥</div>
                            <div className="streak-num">{streaks.currentStreak}</div>
                            <div className="streak-unit">day streak</div>
                            <div className="streak-best">Best: {streaks.longestStreak} days</div>
                        </div>

                        {/* Stats */}
                        <div className="modal-section">
                            <div className="section-label">Stats</div>
                            <div className="stats-row">
                                <div className="stat-box">
                                    <div className="stat-lbl">Today</div>
                                    <div className="stat-val">{habit.count}</div>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-lbl">All-Time</div>
                                    <div className="stat-val all-time">{totalCount}</div>
                                </div>
                            </div>
                        </div>

                        {/* Settings */}
                        <div className="modal-section">
                            <div className="section-label">Settings</div>
                            <div className="toggle-row">
                                <div>
                                    <div className="toggle-label">Daily Reset</div>
                                    <div className="toggle-hint">Resets count at midnight</div>
                                </div>
                                <input
                                    type="checkbox"
                                    className="toggle-check"
                                    checked={resetDaily}
                                    onChange={handleToggleReset}
                                />
                            </div>
                            {resetDaily && (
                                <div className="reset-badge">✓ Daily reset enabled</div>
                            )}
                            <button className="btn btn-ghost" style={{ width: '100%', marginTop: '12px', background: 'var(--warning-light)', color: 'var(--warning)', border: 'none' }} onClick={handleResetDaily}>
                                Reset Today's Count
                            </button>
                        </div>

                        {/* History */}
                        {!loading && (
                            <div className="modal-section">
                                <div className="section-label">History</div>
                                {logs.length === 0 ? (
                                    <div style={{ color: 'var(--text-subtle)', fontSize: '13px', textAlign: 'center', padding: '16px 0' }}>
                                        No history yet
                                    </div>
                                ) : (
                                    <div className="history-list">
                                        {logs.map((log, idx) => {
                                            const timestamp = new Date(log.timestamp);
                                            const formatter = new Intl.DateTimeFormat('en-US', {
                                                timeZone: 'America/New_York',
                                                weekday: 'short',
                                                month: 'short',
                                                day: 'numeric',
                                                hour: '2-digit',
                                                minute: '2-digit',
                                                hour12: true
                                            });
                                            const timeStr = formatter.format(timestamp);
                                            const isPos = log.change > 0;
                                            return (
                                                <div key={idx} className="history-item">
                                                    <div className="history-time">{timeStr}</div>
                                                    <div className={isPos ? 'history-pos' : 'history-neg'}>
                                                        {isPos ? '+' : ''}{log.change}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="modal-footer">
                            <button className="btn btn-primary" onClick={onClose}>Close</button>
                            <button className="btn btn-ghost" style={{ background: 'var(--danger-light)', color: 'var(--danger)', border: 'none', margin: 0 }} onClick={handleDelete}>
                                Delete Habit
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
